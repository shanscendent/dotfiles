# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT CTRL, A, opencode, exec, omarchy-launch-opencode
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# Shan's bindings
# Applications
bindd = SUPER ALT CTRL, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"

# Additional keybinds
bindd = SUPER ALT CTRL, B, Reload Waybar, exec, pkill waybar && hyprctl dispatch exec waybar
bindd = SUPER, L, Lock Screen, exec, hyprlock --immediate
bindd = ALT SHIFT, S, Screenshot of region, exec, hyprshot -m region --clipboard-only -z
bindd = CTRL SHIFT, S, Screenshot of region, exec, hyprshot -m region --clipboard-only -z

# Close window
bindd = SUPER ALT CTRL, Q, Close active window, killactive,

# Control tiling
# TODO:Fix commented ones
bindd = SUPER ALT CTRL, J, Toggle split, togglesplit, # dwindle
bindd = SUPER ALT CTRL, P, Pseudo window, pseudo, # dwindle
# bindd = SUPER ALT CTRL, T, Toggle window floating/tiling, togglefloating,
bindd = SUPER ALT CTRL, F, Full screen, fullscreen, 0
# bindd = SUPER SHIFT ALT CTRL, F, Tiled full screen, fullscreenstate, 0 2
# bindd = SUPER ALT, F, Full width, fullscreen, 1
# bindd = SUPER, O, Pop window out (float & pin), exec, omarchy-hyprland-window-pop
# Poor man's monocle (not needed atm)
# bindd = SUPER ALT CTRL, M, Monocle, fullscreen, 1
# bindd = SUPER ALT CTRL, F, Monocle next, cyclenext

# Move focus with SUPER + arrow keys
bindd = SUPER ALT CTRL, A, Move focus left, movefocus, l
bindd = SUPER ALT CTRL, D, Move focus right, movefocus, r
bindd = SUPER ALT CTRL, W, Move focus up, movefocus, u
bindd = SUPER ALT CTRL, S, Move focus down, movefocus, d

# Switch workspaces with SUPER + [0-9]
bindd = SUPER ALT CTRL, code:10, Switch to workspace 1, workspace, 1
bindd = SUPER ALT CTRL, code:11, Switch to workspace 2, workspace, 2
bindd = SUPER ALT CTRL, code:12, Switch to workspace 3, workspace, 3
bindd = SUPER ALT CTRL, code:13, Switch to workspace 4, workspace, 4
bindd = SUPER ALT CTRL, code:14, Switch to workspace 5, workspace, 5
bindd = SUPER ALT CTRL, code:15, Switch to workspace 6, workspace, 6
bindd = SUPER ALT CTRL, code:16, Switch to workspace 7, workspace, 7
bindd = SUPER ALT CTRL, code:17, Switch to workspace 8, workspace, 8
bindd = SUPER ALT CTRL, code:18, Switch to workspace 9, workspace, 9
bindd = SUPER ALT CTRL, code:19, Switch to workspace 10, workspace, 10

# Move active window to a workspace with SUPER + SHIFT + [0-9]
bindd = SUPER SHIFT ALT CTRL, code:10, Move window to workspace 1, movetoworkspace, 1
bindd = SUPER SHIFT ALT CTRL, code:11, Move window to workspace 2, movetoworkspace, 2
bindd = SUPER SHIFT ALT CTRL, code:12, Move window to workspace 3, movetoworkspace, 3
bindd = SUPER SHIFT ALT CTRL, code:13, Move window to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT ALT CTRL, code:14, Move window to workspace 5, movetoworkspace, 5
bindd = SUPER SHIFT ALT CTRL, code:15, Move window to workspace 6, movetoworkspace, 6
bindd = SUPER SHIFT ALT CTRL, code:16, Move window to workspace 7, movetoworkspace, 7
bindd = SUPER SHIFT ALT CTRL, code:17, Move window to workspace 8, movetoworkspace, 8
bindd = SUPER SHIFT ALT CTRL, code:18, Move window to workspace 9, movetoworkspace, 9
bindd = SUPER SHIFT ALT CTRL, code:19, Move window to workspace 10, movetoworkspace, 10

# Swap active window with the one next to it with SUPER + SHIFT + arrow keys
bindd = SUPER SHIFT ALT CTRL, left, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT ALT CTRL, right, Swap window to the right, swapwindow, r
bindd = SUPER SHIFT ALT CTRL, up, Swap window up, swapwindow, u
bindd = SUPER SHIFT ALT CTRL, down, Swap window down, swapwindow, d

# Resize active window
bindd = SUPER ALT CTRL, minus, Expand window left, resizeactive, -100 0
bindd = SUPER ALT CTRL, equal, Shrink window left, resizeactive, 100 0
bindd = SUPER SHIFT ALT CTRL, minus, Shrink window up, resizeactive, 0 -100
bindd = SUPER SHIFT ALT CTRL, equal, Expand window down, resizeactive, 0 100

# Scroll through existing workspaces with SUPER + scroll
bindd = SUPER ALT CTRL, mouse_down, Scroll active workspace forward, workspace, e+1
bindd = SUPER ALT CTRL, mouse_up, Scroll active workspace backward, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindmd = SUPER ALT CTRL, mouse:272, Move window, movewindow
bindmd = SUPER ALT CTRL, mouse:273, Resize window, resizewindow

# Toggle groups
bindd = SUPER ALT CTRL, G, Toggle window grouping, togglegroup
bindd = SUPER SHIFT ALT CTRL, G, Move active window out of group, moveoutofgroup

# Navigate a single set of grouped windows
bindd = SUPER ALT CTRL, E, Next window in group, changegroupactive, f
bindd = SUPER ALT SHIFT CTRL, E, Previous window in group, changegroupactive, b
# Note that this might break things if you have subwindows in the group
bindd = SUPER ALT CTRL, D, Next window in group, changegroupactive, f
bindd = SUPER ALT CTRL, A, Previous window in group, changegroupactive, b

# Window navigation for grouped windows
# Do you need this?
bindd = SUPER ALT CTRL, LEFT, Move grouped window focus left, changegroupactive, b
bindd = SUPER ALT CTRL, RIGHT, Move grouped window focus right, changegroupactive, f

# Switch
# trigger when the switch is turning off
bindl = , switch:off:Lid Switch, exec, hyprctl keyword input:touchdevice:enabled true
# trigger when the switch is turning on
# TODO: only locks after wake, not before sleep, so you see the unlocked screen for a second
bindl = , switch:on:Lid Switch, exec, hyprctl keyword input:touchdevice:enabled false
bindl = , switch:on:Lid Switch, exec, hyprlock --immediate
