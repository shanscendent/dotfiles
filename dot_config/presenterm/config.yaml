---
# yaml-language-server: $schema=https://raw.githubusercontent.com/mfontanini/presenterm/master/config-file-schema.json
defaults:
  theme:
    light: terminal-light
    dark: terminal-dark

options:
  auto_render_languages:
    - d2

d2:
  scale: 2

export:
  dimensions:
    columns: 100
    rows: 30

bindings:
  next: ["l", "j", "<right>", "<page_down>", "<down>", " ", "d"]
  previous: ["h", "k", "<left>", "<page_up>", "<up>", "e"]
